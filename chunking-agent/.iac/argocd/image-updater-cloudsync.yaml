apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: cezzis-cocktails-chunking-agent-cloudsync-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "cezzis-cocktails-chunking-agent-cloudsync"
      commonUpdateSettings:
        updateStrategy: "semver"
        forceUpdate: true
      images:
        - alias: "cocktailsingestionchunkingagent"
          imageName: "acrveceusgloshared001.azurecr.io/cocktailsingestionchunkingagent:0.x"
          manifestTargets:
            kustomize:
              name: "acrveceusgloshared001.azurecr.io/cocktailsingestionchunkingagent"
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      branch: main
      writeBackTarget: "kustomization:/chunking-agent/.iac/k8s-cloudsync"
