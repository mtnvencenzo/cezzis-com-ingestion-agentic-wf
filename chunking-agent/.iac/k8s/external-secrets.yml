apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-cocktails-chunking-agent-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-secret-store
    kind: SecretStore
  target:
    name: cezzis-cocktails-chunking-agent-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTEL_OTLP_AUTH_HEADER: "Bearer {{ .otelApiKey }}"
        LANGFUSE_SECRET_KEY: "{{ .langfuseSecretKey }}"
  data:
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key-onprem
    - secretKey: langfuseSecretKey
      remoteRef:
        key: langfuse-secret-key
