apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-cocktails-embedding-agent-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cezzis-prm-secret-store
    kind: SecretStore
  target:
    name: cezzis-cocktails-embedding-agent-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OAUTH_CLIENT_SECRET: "{{ .oauthClientSecret }}"
        AISEARCH_API_KEY: ""
  data:
    - secretKey: oauthClientSecret
      remoteRef:
        key: cocktails-embedding-agent-oauth-client-secret

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-cocktails-embedding-agent-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-prm-secret-store
    kind: SecretStore
  target:
    name: cezzis-cocktails-embedding-agent-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTEL_OTLP_AUTH_HEADER: "Bearer {{ .otelApiKey }}"
  data:
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key