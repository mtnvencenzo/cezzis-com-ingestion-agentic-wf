apiVersion: apps/v1
kind: Deployment
metadata:
  name: cezzis-cocktails-embedding-agent-cloudsync
  namespace: cezzis
  labels:
    app: cezzis-cocktails-embedding-agent-cloudsync
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "400"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cezzis-cocktails-embedding-agent-cloudsync
  template:
    metadata:
      labels:
        app: cezzis-cocktails-embedding-agent-cloudsync
        app.kubernetes.io/part-of: cezzis
        app.kubernetes.io/managed-by: argocd
      annotations:
        dapr.io/enabled: "false"
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cezzis-cocktails-embedding-agent-cloudsync
          image: acrveceusgloshared001.azurecr.io/cocktailsingestionembeddingagent
          envFrom:
            - configMapRef:
                name: cezzis-cocktails-embedding-agent-cloudsync-config
            - secretRef:
                name: cezzis-cocktails-embedding-agent-cloudsync-secrets
            - secretRef:
                name: cezzis-cocktails-embedding-agent-cloudsync-shared-secrets
