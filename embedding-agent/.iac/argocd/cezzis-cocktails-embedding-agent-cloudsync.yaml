apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cezzis-cocktails-embedding-agent-cloudsync
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: cezzis
spec:
  project: default
  source:
    repoURL: 'https://github.com/mtnvencenzo/cezzis-com-ingestion-agentic-wf.git'
    targetRevision: main
    path: embedding-agent/.iac/k8s-cloudsync
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cezzis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=false
      - PruneLast=true
